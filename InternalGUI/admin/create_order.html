<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Order - HontoriaOMS</title>
    <link rel="stylesheet" href="../assets/css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <img src="../assets/images/hontoria-logo.png" alt="Hontoria" class="logo">
                <h2>HontoriaOMS</h2>
            </div>

            <button class="sidebar-toggle" id="sidebarToggle">
                <i class="fas fa-bars"></i>
            </button>

            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <i class="fa-solid fa-border-all"></i>
                    <span>Dashboard</span>
                </a>
                <a href="orders.html" class="nav-item active">
                    <i class="fa-solid fa-clipboard-list"></i>
                    <span>Orders</span>
                </a>
                <a href="inventory.html" class="nav-item">
                    <i class="fa-solid fa-boxes-stacked"></i>
                    <span>Inventory</span>
                </a>
                <a href="analytics.html" class="nav-item">
                    <i class="fa-solid fa-chart-simple"></i>
                    <span>Analytics</span>
                </a>
                <a href="archive.html" class="nav-item">
                    <i class="fa-solid fa-box-archive"></i>
                    <span>Archive</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <a href="admin-settings.html" class="nav-item">
                    <i class="fa-regular fa-user"></i>
                    <span>Admin</span>
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="page-header">
                <h1>Create Order</h1>
            </div>

            <form class="create-order-form">
                <div class="form-columns">
                    <!-- Left Column -->
                    <div class="form-column">
                        <!-- Order Details -->
                        <div class="form-card">
                            <h3>Order Details</h3>
                            <div class="form-group">
                                <label for="type">Type:</label>
                                <select id="type" required>
                                    <option value="">Select Type</option>
                                    <option value="Sublimation">Sublimation</option>
                                    <option value="DTF Print">DTF Print</option>
                                    <option value="Heat Transfer">Heat Transfer</option>
                                    <option value="Screen Print">Screen Print</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="class">Class:</label>
                                <select id="class" required>
                                    <option value="">Select class</option>
                                    <option value="Jersey">Jersey</option>
                                    <option value="T-Shirt">T-Shirt</option>
                                    <option value="Hoodie">Hoodie</option>
                                    <option value="Polo">Polo</option>
                                </select>
                            </div>
                        </div>

                        <!-- Customer Information -->
                        <div class="form-card">
                            <h3>Customer Information</h3>
                            <div class="form-group">
                                <label for="first">First:</label>
                                <input type="text" id="first" placeholder="First name" required>
                            </div>
                            <div class="form-group">
                                <label for="middle">Middle:</label>
                                <input type="text" id="middle" placeholder="Middle name">
                            </div>
                            <div class="form-group">
                                <label for="last">Last:</label>
                                <input type="text" id="last" placeholder="Last name" required>
                            </div>
                            <div class="form-group">
                                <label for="chat">Group Chat Link:</label>
                                <input type="url" id="chat" placeholder="https://">
                            </div>
                        </div>

                        <!-- Pricing & Deadline -->
                        <div class="form-card card-green">
                            <h3>Pricing & Deadline</h3>
                            <div class="form-group">
                                <label for="price">Order Price: ₱</label>
                                <input type="number" id="price" placeholder="3,500.00" step="0.01" required>
                            </div>
                            <div class="form-group">
                                <label for="discount">Order Discount:</label>
                                <div class="input-with-icon">
                                    <input type="number" id="discount" placeholder="0" value="0" min="0">
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="dueDate">Due Date:</label>
                                <input type="date" id="dueDate" required>
                            </div>
                        </div>
                    </div>

                    <!-- Right Column -->
                    <div class="form-column">
                        <!-- Size & Quantity -->
                        <div class="form-card card-yellow">
                            <h3>Size & Quantity</h3>
                            <div class="size-input">
                                <input type="text" placeholder="S 20, M 5" class="size-field">
                            </div>
                        </div>

                        <!-- Tasks -->
                        <div class="form-card card-cyan">
                            <h3>Tasks</h3>
                            <div class="tasks-list">
                                <div class="task-item">
                                    <span class="task-name">Designing</span>
                                    <select class="task-status">
                                        <option value="pending">Pending</option>
                                        <option value="in-progress">In Progress</option>
                                        <option value="completed">Completed</option>
                                    </select>
                                </div>
                                <div class="task-item">
                                    <span class="task-name">Printing</span>
                                    <select class="task-status">
                                        <option value="pending">Pending</option>
                                        <option value="in-progress">In Progress</option>
                                        <option value="completed">Completed</option>
                                    </select>
                                </div>
                                <div class="task-item">
                                    <span class="task-name">Heatpress</span>
                                    <select class="task-status">
                                        <option value="pending">Pending</option>
                                        <option value="in-progress">In Progress</option>
                                        <option value="completed">Completed</option>
                                    </select>
                                </div>
                                <div class="task-item">
                                    <span class="task-name">Sewing</span>
                                    <select class="task-status">
                                        <option value="pending">Pending</option>
                                        <option value="in-progress">In Progress</option>
                                        <option value="completed">Completed</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <!-- Employees -->
                        <div class="form-card card-blue">
                            <h3>Employees</h3>
                            <div class="employees-section">
                                <select id="employees" class="employees-select">
                                    <option value="">None</option>
                                    <option value="kim">Kim</option>
                                    <option value="kat">Kat</option>
                                    <option value="aljon">Aljon</option>
                                    <option value="volar">Volar</option>
                                </select>
                                <button type="button" class="btn-edit">Edit</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="form-actions">
                    <a href="orders.html" class="btn btn-secondary">Back</a>
                    <button type="submit" class="btn btn-confirm">Confirm Creation</button>
                </div>
            </form>
        </main>
    </div>

    <script>
        const sidebar = document.getElementById('sidebar');
        const sidebarToggle = document.getElementById('sidebarToggle');

        sidebarToggle.addEventListener('click', function() {
            sidebar.classList.toggle('collapsed');
        });

        // Form submission
        document.querySelector('.create-order-form').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Order created successfully!');
            // Add your form submission logic here
        });
    </script>
</body>
</html>
